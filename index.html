<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>השמורה המסתורית</title>
<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;600&family=Secular+One&family=Special+Elite&display=swap" rel="stylesheet">
<style>
:root{--gold:#c9a84c;--gold-l:#f0cc6e;--gold-d:#7a5810;--dark:#07100a;--border:rgba(201,168,76,.28);--cream:#f5edd8;--dim:#7a9070;}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;background:#07100a;font-family:'Rubik',sans-serif;color:#f5edd8;}

/* FRAME — contains the iframe */
.frame{position:fixed;inset:0;z-index:1;}
iframe{width:100%;height:100%;border:none;display:block;}

/* STAGE INDICATOR */
.stage-bar{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  z-index:100;display:flex;gap:6px;padding:.4rem .8rem;
  background:rgba(5,10,4,.85);border-radius:8px 8px 0 0;
  border:1px solid rgba(201,168,76,.2);border-bottom:none;
  pointer-events:none;
}
.stage-dot{
  width:10px;height:10px;border-radius:50%;
  background:rgba(201,168,76,.2);border:1px solid rgba(201,168,76,.3);
  transition:background .3s;
}
.stage-dot.active{background:var(--gold);}
.stage-dot.done{background:rgba(201,168,76,.5);}

/* DEV stage-skip */
.dev-skip{
  position:fixed;top:.4rem;right:.4rem;z-index:200;
  background:transparent;border:none;cursor:pointer;opacity:.1;font-size:1rem;color:#00ff41;
  font-family:monospace;
}
.dev-skip:hover{opacity:.5;}
</style>
</head>
<body>
<div class="frame">
  <iframe id="stage-frame" src="stage1.html" allow="autoplay"></iframe>
</div>

<div class="stage-bar">
  <div class="stage-dot active" id="dot-1" title="שלב 1"></div>
  <div class="stage-dot" id="dot-2" title="שלב 2"></div>
  <div class="stage-dot" id="dot-3" title="שלב 3"></div>
  <div class="stage-dot" id="dot-4" title="שלב 4"></div>
  <div class="stage-dot" id="dot-5" title="שלב 5"></div>
  <div class="stage-dot" id="dot-6" title="שלב 6"></div>
</div>

<script>
const STAGES=['stage1.html','stage2.html','stage3.html','stage4.html','puzzle.html','stage6.html'];
let currentStage=0;

// Listen for messages from child iframes to advance stages
window.addEventListener('message',e=>{
  if(e.data==='nextStage') goToStage(currentStage+1);
  if(e.data?.stage) goToStage(e.data.stage-1);
});

function goToStage(idx){
  if(idx>=STAGES.length) return;
  // Mark previous as done
  document.getElementById(`dot-${currentStage+1}`)?.classList.replace('active','done');
  currentStage=idx;
  document.getElementById(`dot-${idx+1}`)?.classList.add('active');
  document.getElementById('stage-frame').src=STAGES[idx];
}

// Dev: click stage dots to jump
document.querySelectorAll('.stage-dot').forEach((dot,i)=>{
  dot.style.pointerEvents='auto';dot.style.cursor='pointer';
  dot.addEventListener('click',()=>goToStage(i));
});
</script>
</body>
</html>
